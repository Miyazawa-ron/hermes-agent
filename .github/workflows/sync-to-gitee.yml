name: Sync to Gitee Mirror

on:
  schedule:
    # 每天北京时间 8:00 自动同步
    - cron: '0 0 * * *'
  # 手动触发
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout upstream (NousResearch/hermes-agent)
        uses: actions/checkout@v4
        with:
          repository: NousResearch/hermes-agent
          ref: main
          fetch-depth: 0

      - name: Push to Gitee mirror
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          git remote add gitee https://miyazawaron:${GITEE_TOKEN}@gitee.com/miyazawaron/hermes-agent.git
          git push --force --all gitee
          git push --force --tags gitee
          echo "✅ Sync to Gitee complete: $(date '+%Y-%m-%d %H:%M:%S')"
